name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Capture version
        id: version
        shell: bash
        run: echo "mod_version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashback-extras-${{ steps.version.outputs.mod_version }}
          path: build/libs/*[^sources].jar
          if-no-files-found: error

  publish-github:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: flashback-extras-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.jar

  publish-modrinth:
    if: ${{ secrets.MODRINTH_TOKEN != '' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: flashback-extras-*
          path: dist
          merge-multiple: true

      - name: Capture version
        id: version
        shell: bash
        run: echo "mod_version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-id: IHewjCjy
          files: dist/*.jar
          name: Flashback Extras ${{ steps.version.outputs.mod_version }}
          version: ${{ steps.version.outputs.mod_version }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: fabric
          game-versions: |
            1.21.11
          dependencies: |
            flashback(required){modrinth:A7t2en6T}
